    patch:
      operationId: updateConsult
      tags: [Consultations]
      summary: Update a consultation
      requestBody:
        $ref: '#/components/requestBodies/GenericResource'
      responses:
        '200':
          $ref: '#/components/responses/ItemResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/healthstatus:
    get:
      operationId: listHealthStatuses
      tags: [Consultations]
      summary: List health statuses (reference)
      responses:
