  /v1/appointmenttype:
    get:
      operationId: listAppointmentTypes
      tags: [Appointments]
      summary: List appointment types (reference)
      responses:
        '200':
          $ref: '#/components/responses/ListResponse'
  /v1/appointmentstatus:
    get:
      operationId: listAppointmentStatuses
      tags: [Appointments]
      summary: List appointment statuses (reference)
