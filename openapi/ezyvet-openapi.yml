openapi: 3.0.3
info:
  title: ezyVet API
  description: >-
    The ezyVet API is a RESTful interface to ezyVet, cloud-based veterinary
    practice information management software (PIMS). ezyVet was founded in New
    Zealand in 2006 and acquired by IDEXX Laboratories in June 2021, alongside
    IDEXX's Cornerstone and Neo PIMS (the acquisition also included Vet Radar).

    The full API spans roughly 216 endpoints across animals/patients,
    contacts/clients, appointments, consultations, invoices, products, and
    diagnostics. Access is partner-gated: a developer must apply for an
    integration and receive an approved partner_id plus client_id/client_secret,
    then obtain a bearer token via the OAuth 2.0 Client Credentials grant. Tokens
    have a 12-hour TTL.

    GROUNDING NOTE: The OAuth token endpoint, the /v1/contact CRUD endpoints, the
    Standard Diagnostic Integration, and the base/rate-limit behavior below are
    confirmed from ezyVet's public developer documentation (developers.ezyvet.com).
    The remaining resource paths (animal, appointment, consult, invoice, product,
    diagnostic, prescription, vaccination and their reference resources) are
    MODELED on ezyVet's documented /v1/{resource} REST pattern and published
    resource categories - operationId or path names may differ from the exact
    ezyVet catalog. Consult the partner Postman collection for authoritative
    request/response shapes.
  version: '1.0'
  contact:
    name: ezyVet Developer Portal
    url: https://developers.ezyvet.com/docs/v1/
  x-ownership: ezyVet is owned by IDEXX Laboratories, Inc. (acquired June 2021).
servers:
  - url: https://api.ezyvet.com
    description: Production
  - url: https://api.trial.ezyvet.com
    description: Trial / sandbox
security:
  - bearerAuth: []
tags:
  - name: Authentication
    description: OAuth 2.0 Client Credentials token exchange. (Confirmed.)
  - name: Animals
    description: Animal (patient) records and reference data. (Modeled.)
  - name: Contacts
    description: Contacts (clients / pet owners) and their details. (Confirmed CRUD.)
  - name: Appointments
    description: Appointments, types, and statuses. (Modeled.)
  - name: Consultations
    description: Clinical consultation records. (Modeled.)
  - name: Invoices
    description: Invoices, invoice lines, and payments. (Modeled.)
  - name: Products
    description: Product / inventory catalog. (Modeled.)
  - name: Diagnostics
    description: Diagnostic requests and results (Standard Diagnostic Integration). (Confirmed integration.)
  - name: Prescriptions
    description: Prescriptions and vaccinations. (Partially confirmed.)
paths:
  /v1/oauth/access_token:
    post:
      operationId: createAccessToken
      tags:
        - Authentication
      summary: Obtain an OAuth 2.0 access token
      description: >-
        Exchange partner_id, client_id, client_secret, grant_type
        (client_credentials), and scope for a bearer access token. Tokens are
        valid for 12 hours and must be refreshed before expiry. (Confirmed
        endpoint.)
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AccessTokenRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/AccessTokenRequest'
      responses:
        '200':
          description: An access token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessTokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
  /v1/animal:
    get:
      operationId: listAnimals
      tags: [Animals]
      summary: List animals (patients)
      description: Lists animal records. Filter with query parameters and paginate via meta. (Modeled.)
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Active'
      responses:
        '200':
          $ref: '#/components/responses/ListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
    post:
      operationId: createAnimal
      tags: [Animals]
      summary: Create an animal
      description: Creates a new animal (patient) record. (Modeled.)
      requestBody:
        $ref: '#/components/requestBodies/GenericResource'
      responses:
        '200':
          $ref: '#/components/responses/ItemResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
  /v1/animal/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      operationId: getAnimal
      tags: [Animals]
      summary: Retrieve an animal
      responses:
        '200':
          $ref: '#/components/responses/ItemResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: updateAnimal
      tags: [Animals]
      summary: Update an animal
      requestBody:
        $ref: '#/components/requestBodies/GenericResource'
      responses:
        '200':
          $ref: '#/components/responses/ItemResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteAnimal
      tags: [Animals]
      summary: Delete an animal
      responses:
        '200':
          $ref: '#/components/responses/DeleteResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/species:
    get:
      operationId: listSpecies
      tags: [Animals]
      summary: List species (reference)
      description: Reference list of species used on animal records. (Modeled.)
      responses:
        '200':
          $ref: '#/components/responses/ListResponse'
  /v1/breed:
    get:
      operationId: listBreeds
      tags: [Animals]
      summary: List breeds (reference)
      description: Reference list of breeds. (Modeled.)
      responses:
        '200':
          $ref: '#/components/responses/ListResponse'
  /v1/contact:
    get:
      operationId: listContacts
      tags: [Contacts]
      summary: List contacts (clients)
      description: Lists contacts - clients, businesses, vendors, and staff. (Confirmed.)
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Active'
      responses:
        '200':
          $ref: '#/components/responses/ListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
    post:
      operationId: createContact
      tags: [Contacts]
      summary: Create a contact
      description: Creates a new contact. (Confirmed.)
      requestBody:
        $ref: '#/components/requestBodies/GenericResource'
      responses:
        '200':
          $ref: '#/components/responses/ItemResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
  /v1/contact/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      operationId: getContact
      tags: [Contacts]
      summary: Retrieve a contact
      responses:
        '200':
          $ref: '#/components/responses/ItemResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: updateContact
      tags: [Contacts]
      summary: Update a contact
      description: Updates an existing contact. (Confirmed.)
      requestBody:
        $ref: '#/components/requestBodies/GenericResource'
      responses:
        '200':
          $ref: '#/components/responses/ItemResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteContact
      tags: [Contacts]
      summary: Delete a contact
      description: Deletes a contact. (Confirmed.)
      responses:
        '200':
          $ref: '#/components/responses/DeleteResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/address:
    get:
      operationId: listAddresses
      tags: [Contacts]
      summary: List addresses (reference)
      description: Physical and postal addresses linked to contacts. (Modeled.)
      responses:
        '200':
          $ref: '#/components/responses/ListResponse'
  /v1/appointment:
    get:
      operationId: listAppointments
      tags: [Appointments]
      summary: List appointments
      description: Lists appointments; filter by date range, resource, or status. (Modeled.)
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Page'
      responses:
        '200':
          $ref: '#/components/responses/ListResponse'
    post:
      operationId: createAppointment
      tags: [Appointments]
      summary: Create an appointment
      requestBody:
        $ref: '#/components/requestBodies/GenericResource'
      responses:
        '200':
          $ref: '#/components/responses/ItemResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
  /v1/appointment/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      operationId: getAppointment
      tags: [Appointments]
      summary: Retrieve an appointment
      responses:
        '200':
          $ref: '#/components/responses/ItemResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: updateAppointment
      tags: [Appointments]
      summary: Update an appointment
      requestBody:
        $ref: '#/components/requestBodies/GenericResource'
      responses:
        '200':
          $ref: '#/components/responses/ItemResponse'
        '404':
