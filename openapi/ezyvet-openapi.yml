  /v1/consult:
    get:
      operationId: listConsults
      tags: [Consultations]
      summary: List consultations
      description: Lists clinical consultation records. (Modeled.)
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Page'
      responses:
        '200':
          $ref: '#/components/responses/ListResponse'
    post:
      operationId: createConsult
      tags: [Consultations]
      summary: Create a consultation
      requestBody:
        $ref: '#/components/requestBodies/GenericResource'
      responses:
        '200':
          $ref: '#/components/responses/ItemResponse'
