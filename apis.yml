name: ezyVet
kind: company
description: ezyVet is cloud-based veterinary practice information management software
  (PIMS) for clinics, specialty, and emergency hospitals, covering patient records,
  scheduling, clinical workflows, billing, inventory, and diagnostics. Founded in New
  Zealand in 2006, ezyVet was acquired by IDEXX Laboratories in June 2021 and sits
  alongside IDEXX's Cornerstone and Neo PIMS offerings (the acquisition also included
  Vet Radar). ezyVet exposes a documented RESTful API of roughly 216 endpoints over
  animals/patients, contacts/clients, appointments, consultations, invoices, products,
  and diagnostics. The API is partner-gated - developer access requires an approved
  integration application and issued client credentials - but the endpoint catalog,
  best-practice guides, and a full Postman collection are publicly documented at
  developers.ezyvet.com. Authentication is OAuth 2.0 Client Credentials with 12-hour
  bearer tokens.
