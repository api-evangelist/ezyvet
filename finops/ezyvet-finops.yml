description: >-
  FinOps view of ezyVet spend. ezyVet (an IDEXX company) is billed as a
  per-practice SaaS subscription rather than a metered API. The dominant cost is
  the recurring subscription quoted per practice, scaling with clinic size, user
  / veterinarian count, and modules. The API itself carries no separate per-call
  charge - it is included with the subscription and governed by rate limits, not
  by metered billing - so API cost management is about staying within throttle
  ceilings and building efficient integrations rather than optimizing a usage
  bill. Enterprise / corporate-group agreements are negotiated.
notes: >-
  ezyVet publishes no public price list; subscription rates are quoted. There is
  no usage-based API meter to reconcile against a FOCUS billing export. Track
  spend as a fixed SaaS subscription line plus any integration/partner or
  third-party middleware costs.
