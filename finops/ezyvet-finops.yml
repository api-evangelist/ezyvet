meters:
- name: practice_subscription
  description: Recurring per-practice ezyVet subscription fee.
  unit: practice
  aggregation: sum
  dimensions:
  - practice
  - region
- name: user_seats
  description: User / veterinarian seats influencing subscription tier.
  unit: users
  aggregation: max
  dimensions:
  - practice
- name: api_calls
  description: >-
    API request volume. Not billed - included with the subscription and governed
    by rate limits - but worth tracking to stay under the ~60/min per-endpoint
    and ~180/min global throttle.
  unit: requests
  aggregation: sum
  dimensions:
  - practice
  - partner
principles:
- name: Visibility
  description: Track the ezyVet subscription as a fixed SaaS line per practice; monitor API request volume against rate-limit ceilings even though it is not billed.
- name: Allocation
  description: Map each practice subscription to its clinic / cost center; attribute integration effort to the partner or team that owns it.
- name: Optimization
  description: Right-size the subscription to actual user count and modules; build integrations that batch and cache to stay within rate limits and avoid 429s rather than over-provisioning workarounds.
- name: Accountability
  description: Assign an owner per practice subscription and per integration; review subscription renewals and integration health on a regular cadence.
