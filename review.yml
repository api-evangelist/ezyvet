actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists, and ezyVet's documented API is
    request/response REST (OAuth 2.0 Client Credentials, ~216 endpoints). No SSE
    or other server-push transport is documented either, so no AsyncAPI document
    was created - there is no streaming channel on ezyVet's own API to model. The
    Standard Diagnostic Integration is partner-to-ezyVet REST callbacks, not a
    subscribable stream.
